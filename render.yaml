services:
  - type: web
    name: jobbridge-api
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    healthCheckPath: /jobs
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: STEALTH_ADMIN_ID
        value: superadmin
      - key: STEALTH_ADMIN_PASSWORD
        value: JobBridge@2026Admin
      - key: ADMIN_SECRET
        sync: false
