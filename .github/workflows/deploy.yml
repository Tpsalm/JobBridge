name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run build
        # Env vars are provided by .env.production (committed to repo)
        # For sensitive keys (e.g., OpenAI), set them as GitHub secrets:
        #   https://github.com/jobbridge/jobbridge/settings/secrets/actions
        # env:
        #   VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
      - name: Fix SPA routing
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Inspect built site
        run: |
          echo "Dist contents:"
          ls -la dist
          find dist -maxdepth 2 -type f | sort
      - id: deployment
        uses: actions/deploy-pages@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
