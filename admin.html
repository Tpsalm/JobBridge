<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JobBridge Admin Console</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
        <script src="./admin-config.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: #f8fafc;
                color: #0f172a;
                overflow: hidden;
            }
            .spinner {
                width: 20px;
                height: 20px;
                border: 2px solid rgba(255, 255, 255, 0.3);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
                display: inline-block;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .btn {
                padding: 7px 14px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: 500;
                border: none;
                cursor: pointer;
                transition: 0.15s;
                display: inline-flex;
                align-items: center;
                gap: 5px;
            }
            .btn-primary {
                background: #2563eb;
                color: #fff;
            }
            .btn-primary:hover {
                background: #1d4ed8;
            }
            .btn-danger {
                background: #fef2f2;
                color: #dc2626;
                border: 1px solid #fecaca;
            }
            .btn-danger:hover {
                background: #fee2e2;
            }
            .btn-success {
                background: #f0fdf4;
                color: #16a34a;
                border: 1px solid #bbf7d0;
            }
            .btn-success:hover {
                background: #dcfce7;
            }
            .btn-ghost {
                background: #f1f5f9;
                color: #475569;
                border: 1px solid #e2e8f0;
            }
            .btn-ghost:hover {
                background: #e2e8f0;
            }
            .btn-warning {
                background: #fffbeb;
                color: #d97706;
                border: 1px solid #fde68a;
            }
            .btn-warning:hover {
                background: #fef3c7;
            }
            input,
            select,
            textarea {
                border: 1px solid #e2e8f0;
                border-radius: 8px;
                padding: 9px 12px;
                font-size: 13px;
                outline: none;
                width: 100%;
                transition: 0.15s;
            }
            input:focus,
            select:focus,
            textarea:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            }
            .badge {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 999px;
                font-size: 11px;
                font-weight: 500;
            }
            .table-wrap {
                overflow-x: auto;
                border-radius: 12px;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th {
                text-align: left;
                padding: 10px 12px;
                font-weight: 600;
                color: #64748b;
                font-size: 12px;
                background: #f8fafc;
                border-bottom: 1px solid #e2e8f0;
                white-space: nowrap;
            }
            td {
                padding: 10px 12px;
                border-bottom: 1px solid #f1f5f9;
                font-size: 13px;
                vertical-align: middle;
            }
            tr:hover td {
                background: #fafafa;
            }
            .modal-overlay {
                position: fixed;
                inset: 0;
                z-index: 50;
                background: rgba(0, 0, 0, 0.4);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 16px;
                animation: fadeIn 0.15s;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            .modal-card {
                background: #fff;
                border-radius: 16px;
                padding: 24px;
                max-width: 680px;
                width: 100%;
                max-height: 85vh;
                overflow-y: auto;
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
                animation: slideUp 0.2s;
            }
            @keyframes slideUp {
                from {
                    transform: translateY(20px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            .modal-wide {
                max-width: 800px;
            }
            .modal-sm {
                max-width: 440px;
            }
            .toast {
                position: fixed;
                top: 16px;
                right: 16px;
                z-index: 100;
                padding: 12px 20px;
                border-radius: 10px;
                color: #fff;
                font-size: 13px;
                font-weight: 500;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
                animation: slideIn 0.2s;
            }
            @keyframes slideIn {
                from {
                    transform: translateX(40px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            .stat-card {
                background: #fff;
                border-radius: 12px;
                border: 1px solid #e2e8f0;
                padding: 16px;
                transition: 0.15s;
            }
            .stat-card:hover {
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            }
            .stat-num {
                font-size: 24px;
                font-weight: 700;
                line-height: 1.2;
            }
            .stat-label {
                font-size: 12px;
                color: #64748b;
                margin-top: 2px;
            }
            .chart-bar {
                height: 8px;
                border-radius: 4px;
                background: #e2e8f0;
                overflow: hidden;
            }
            .chart-bar-fill {
                height: 100%;
                border-radius: 4px;
                transition: width 0.6s ease;
            }
            .section-title {
                font-size: 13px;
                font-weight: 600;
                color: #64748b;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                padding: 12px 12px 6px;
            }
            ::-webkit-scrollbar {
                width: 5px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 3px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #94a3b8;
            }
            .pulse {
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }
            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .form-grid .full {
                grid-column: 1/-1;
            }
            .tab-badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 18px;
                height: 18px;
                padding: 0 5px;
                border-radius: 999px;
                font-size: 10px;
                font-weight: 700;
                line-height: 1;
            }
        </style>
    </head>
    <body>
        <div id="app" class="min-h-screen"></div>
        <script>
            // ═══════════════════════════════════════════
            // Admin auth + session security
            // Provide the anon key via a global before this script runs:
            // window.__JOBBRIDGE_SUPABASE_ANON_KEY__ = '...';
            // Optional: override the project URL the same way.
            let loginAttempts = parseInt(
                sessionStorage.getItem("jb_attempts") || "0",
            );
            let loginLockedUntil = parseInt(
                sessionStorage.getItem("jb_locked_until") || "0",
            );
            const MAX_ATTEMPTS = 5;
            const LOCKOUT_MINUTES = 15;
            let sessionTimer = null;
            const SESSION_TIMEOUT_MS = 30 * 60 * 1000;
            const SUPABASE_URL =
                window.__JOBBRIDGE_SUPABASE_URL__ ||
                "https://ppramomuckkjzssrfghi.supabase.co";
            const SUPABASE_ANON_KEY =
                window.__JOBBRIDGE_SUPABASE_ANON_KEY__ || "";
            const FUNCTIONS_BASE_URL = `${SUPABASE_URL}/functions/v1`;
            const ADMIN_CREATE_USER_FUNCTION = `${FUNCTIONS_BASE_URL}/admin-create-user`;

            function isSupabaseConfigured() {
                return Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);
            }

            const sb = isSupabaseConfigured()
                ? window.supabase.createClient(
                      SUPABASE_URL,
                      SUPABASE_ANON_KEY,
                      {
                          auth: {
                              persistSession: true,
                              autoRefreshToken: true,
                              detectSessionInUrl: true,
                          },
                      },
                  )
                : null;

            function renderConfigError() {
                renderApp(`
      <div class="h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#1d4ed8 100%)">
        <div class="bg-white/95 backdrop-blur rounded-2xl p-8 w-full max-w-lg shadow-2xl">
          <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.29 3.86l-7.5 13A1 1 0 003.66 18h16.68a1 1 0 00.87-1.5l-7.5-13a1 1 0 00-1.74 0z"/></svg>
          </div>
          <h1 class="text-2xl font-bold text-gray-900 text-center mb-3">Admin Console Configuration Required</h1>
          <p class="text-sm text-gray-600 text-center mb-4">This admin build no longer accepts a browser-exposed service-role key. Configure a public Supabase anon key and sign in with a real admin account.</p>
          <div class="bg-gray-50 rounded-xl p-4 text-xs text-gray-700 space-y-2">
            <p><strong>Required global:</strong> <code>window.__JOBBRIDGE_SUPABASE_ANON_KEY__</code></p>
            <p><strong>Optional global:</strong> <code>window.__JOBBRIDGE_SUPABASE_URL__</code></p>
            <p>Expected project: <code>${esc(SUPABASE_URL)}</code></p>
          </div>
        </div>
      </div>
    `);
            }

            async function getAccessToken() {
                if (!sb) return "";
                const {
                    data: { session },
                } = await sb.auth.getSession();
                return session?.access_token || "";
            }

            async function resolveAdminUserFromSession() {
                if (!sb) return null;
                const {
                    data: { session },
                } = await sb.auth.getSession();
                if (!session?.user) return null;

                const { data: profile, error } = await sb
                    .from("profiles")
                    .select("id, email, full_name, role")
                    .eq("id", session.user.id)
                    .maybeSingle();

                if (error || profile?.role !== "admin") {
                    await sb.auth.signOut();
                    return null;
                }

                return {
                    id: profile.id,
                    email: profile.email || session.user.email || "",
                    full_name:
                        profile.full_name || session.user.email || "Admin",
                    role: profile.role,
                };
            }

            async function callAdminCreateUser(payload) {
                const accessToken = await getAccessToken();
                if (!accessToken) throw new Error("Admin session expired");

                const res = await fetch(ADMIN_CREATE_USER_FUNCTION, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        apikey: SUPABASE_ANON_KEY,
                        Authorization: "Bearer " + accessToken,
                    },
                    body: JSON.stringify(payload),
                });

                const text = await res.text();
                const json = text ? JSON.parse(text) : {};
                if (!res.ok) {
                    throw new Error(json.error || `HTTP ${res.status}`);
                }
                return json;
            }
            let S = {
                user: null,
                tab: "dashboard",
                users: [],
                jobs: [],
                apps: [],
                providers: [],
                convs: [],
                notifs: [],
                ads: [],
                payments: [],
                subs: [],
                events: [],
                loading: true,
            };
            let modal = null;
            let refreshInterval = null;
            let refreshOn = true;
            let captchaAnswer = 0;

            const $ = (s) => document.querySelector(s);
            const $$ = (s) => [...document.querySelectorAll(s)];
            const esc = (t) => {
                if (t == null) return "";
                const d = document.createElement("div");
                d.textContent = t;
                return d.innerHTML;
            };
            const fdate = (d) =>
                d
                    ? new Date(d).toLocaleDateString("en-GB", {
                          day: "numeric",
                          month: "short",
                          year: "numeric",
                      })
                    : "\u2014";
            const fdatetime = (d) =>
                d
                    ? new Date(d).toLocaleString("en-GB", {
                          day: "numeric",
                          month: "short",
                          year: "numeric",
                          hour: "2-digit",
                          minute: "2-digit",
                      })
                    : "\u2014";
            const money = (n) => "\u20A6" + (n || 0).toLocaleString();

            function notify(msg, tp) {
                const d = document.createElement("div");
                d.className =
                    "toast " +
                    (tp === "error"
                        ? "bg-red-600"
                        : tp === "warn"
                          ? "bg-amber-600"
                          : "bg-emerald-600");
                d.textContent = msg;
                document.body.appendChild(d);
                setTimeout(() => {
                    d.style.transition = "opacity .3s";
                    d.style.opacity = "0";
                    setTimeout(() => d.remove(), 300);
                }, 2800);
            }

            function renderApp(h) {
                $("#app").innerHTML = h;
            }

            function roleColor(r) {
                const m = {
                    admin: "bg-purple-100 text-purple-700",
                    recruiter: "bg-blue-100 text-blue-700",
                    provider: "bg-amber-100 text-amber-700",
                    job_seeker: "bg-gray-100 text-gray-700",
                };
                return m[r] || "bg-gray-100 text-gray-600";
            }
            function sColor(s) {
                if (
                    s === "active" ||
                    s === "hired" ||
                    s === true ||
                    s === "verified" ||
                    s === "success"
                )
                    return "bg-emerald-100 text-emerald-700";
                if (s === "pending" || s === "flagged")
                    return "bg-amber-100 text-amber-700";
                if (s === "reviewed") return "bg-blue-100 text-blue-700";
                if (
                    s === "rejected" ||
                    s === "banned" ||
                    s === "suspended" ||
                    s === "failed" ||
                    s === "refunded"
                )
                    return "bg-red-100 text-red-700";
                return "bg-gray-100 text-gray-600";
            }

            async function audit(action, target, id, extra) {
                if (!sb || !S.user?.id) return;
                try {
                    await sb.from("admin_events").insert({
                        admin_id: S.user.id,
                        admin_name: S.user.full_name || S.user.email || "Admin",
                        action_type: action,
                        target_type: target,
                        target_id: id || null,
                        details: extra || {},
                    });
                } catch (e) {}
            }

            function showLogin() {
                if (!isSupabaseConfigured()) {
                    renderConfigError();
                    return;
                }
                const now = Date.now();
                // Check lockout
                const lockedUntil = parseInt(
                    sessionStorage.getItem("jb_locked_until") || "0",
                );
                if (lockedUntil > now) {
                    const mins = Math.ceil((lockedUntil - now) / 60000);
                    renderApp(`
      <div class="h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#1d4ed8 100%)">
        <div class="bg-white/95 backdrop-blur rounded-2xl p-8 w-full max-w-sm shadow-2xl text-center">
          <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 15v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <h2 class="text-xl font-bold text-gray-900 mb-2">Account Locked</h2>
          <p class="text-sm text-gray-600 mb-4">Too many failed attempts. Try again in <b>${mins} minute${mins !== 1 ? "s" : ""}</b>.</p>
          <p class="text-xs text-gray-400">This protects against brute-force attacks.</p>
        </div>
      </div>
    `);
                    return;
                }

                // Generate CAPTCHA challenge
                const a = Math.floor(Math.random() * 20) + 1,
                    b = Math.floor(Math.random() * 20) + 1;
                captchaAnswer = a + b;
                renderApp(`
    <div class="h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#1d4ed8 100%)">
      <div class="bg-white/95 backdrop-blur rounded-2xl p-8 w-full max-w-sm shadow-2xl">
        <div class="text-center mb-6">
          <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-blue-700 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
            <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <h1 class="text-2xl font-bold text-gray-900">Admin Console</h1>
          <p class="text-sm text-gray-500 mt-1">JobBridge Platform Management</p>
        </div>
        <div id="login-err" class="text-red-600 text-sm mb-3 p-3 bg-red-50 rounded-lg hidden"></div>
        <input id="login-id" type="email" placeholder="Admin email" class="mb-3" autocomplete="username">
        <input id="login-pw" type="password" placeholder="Password" class="mb-4" autocomplete="current-password">
        <div class="bg-blue-50 rounded-lg p-3 mb-4 text-center">
          <p class="text-xs text-blue-700 mb-1">Security Verification</p>
          <p class="text-lg font-bold text-blue-900">${a} + ${b} = ?</p>
        </div>
        <input id="login-captcha" type="number" placeholder="Enter the answer" class="mb-5" autocomplete="off">
        <button onclick="login()" class="w-full py-3 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold rounded-xl transition shadow-lg shadow-blue-200">Sign In</button>
        ${loginAttempts > 0 ? `<p class="text-xs text-red-400 text-center mt-3">${MAX_ATTEMPTS - loginAttempts} attempt${MAX_ATTEMPTS - loginAttempts !== 1 ? "s" : ""} remaining</p>` : ""}
      </div>
    </div>
  `);
                setTimeout(() => {
                    const e = $("#login-id");
                    if (e) e.focus();
                }, 100);
            }

            window.login = async function () {
                if (!sb) {
                    renderConfigError();
                    return;
                }

                const id = $("#login-id").value.trim(),
                    pw = $("#login-pw").value,
                    captcha = $("#login-captcha")?.value,
                    er = $("#login-err");

                const lockedUntil = parseInt(
                    sessionStorage.getItem("jb_locked_until") || "0",
                );
                if (lockedUntil > Date.now()) {
                    showLogin();
                    return;
                }

                if (!id || !pw) {
                    er.textContent = "Enter admin email and password";
                    er.classList.remove("hidden");
                    return;
                }

                if (parseInt(captcha) !== captchaAnswer) {
                    er.textContent =
                        "Incorrect security answer. Please try again.";
                    er.classList.remove("hidden");
                    loginAttempts++;
                    sessionStorage.setItem(
                        "jb_attempts",
                        String(loginAttempts),
                    );
                    if (loginAttempts >= MAX_ATTEMPTS) {
                        const lockUntil =
                            Date.now() + LOCKOUT_MINUTES * 60 * 1000;
                        sessionStorage.setItem(
                            "jb_locked_until",
                            String(lockUntil),
                        );
                    }
                    setTimeout(() => showLogin(), 1500);
                    return;
                }

                try {
                    const { error } = await sb.auth.signInWithPassword({
                        email: id,
                        password: pw,
                    });
                    if (error) throw error;

                    const adminUser = await resolveAdminUserFromSession();
                    if (!adminUser) {
                        throw new Error(
                            "This account does not have admin access.",
                        );
                    }

                    sessionStorage.setItem("jb_login_time", String(Date.now()));
                    sessionStorage.removeItem("jb_attempts");
                    sessionStorage.removeItem("jb_locked_until");
                    loginAttempts = 0;
                    S.user = adminUser;
                    await audit("login", "session", adminUser.id, {
                        method: "supabase_auth",
                    });
                    startSessionTimer();
                    init();
                } catch (error) {
                    er.textContent = error.message || "Invalid credentials";
                    er.classList.remove("hidden");
                    loginAttempts++;
                    sessionStorage.setItem(
                        "jb_attempts",
                        String(loginAttempts),
                    );
                    if (loginAttempts >= MAX_ATTEMPTS) {
                        const lockUntil =
                            Date.now() + LOCKOUT_MINUTES * 60 * 1000;
                        sessionStorage.setItem(
                            "jb_locked_until",
                            String(lockUntil),
                        );
                        notify(
                            "Account locked for " +
                                LOCKOUT_MINUTES +
                                " minutes due to too many failed attempts.",
                            "error",
                        );
                    }
                    if (sb) {
                        try {
                            await sb.auth.signOut();
                        } catch (e) {}
                    }
                }
            };

            async function loadData() {
                S.loading = true;
                if (!refreshOn) {
                    S.loading = false;
                    render();
                    return;
                }
                try {
                    const u = await sb
                        .from("profiles")
                        .select("*")
                        .order("created_at", { ascending: false })
                        .then((r) => r.data || [])
                        .catch(() => []);
                    const j = await sb
                        .from("jobs")
                        .select("*")
                        .order("created_at", { ascending: false })
                        .then((r) => r.data || [])
                        .catch(() => []);
                    const app = await sb
                        .from("applications")
                        .select("*")
                        .order("created_at", { ascending: false })
                        .then((r) => r.data || [])
                        .catch(() => []);
                    const prov = await sb
                        .from("service_providers")
                        .select("*")
                        .order("created_at", { ascending: false })
                        .then((r) => r.data || [])
                        .catch(() => []);
                    const conv = await sb
                        .from("conversations")
                        .select("*")
                        .order("created_at", { ascending: false })
                        .then((r) => r.data || [])
                        .catch(() => []);
                    const notif = await sb
                        .from("notifications")
                        .select("*")
                        .order("created_at", { ascending: false })
                        .then((r) => r.data || [])
                        .catch(() => []);
                    const ad = await sb
                        .from("advertisements")
                        .select("*")
                        .order("created_at", { ascending: false })
                        .then((r) => r.data || [])
                        .catch(() => []);
                    const pay = await sb
                        .from("payments")
                        .select("*")
                        .order("created_at", { ascending: false })
                        .then((r) => r.data || [])
                        .catch(() => []);
                    const subs = await sb
                        .from("blog_subscribers")
                        .select("*")
                        .order("created_at", { ascending: false })
                        .then((r) => r.data || [])
                        .catch(() => []);
                    const ev = await sb
                        .from("admin_events")
                        .select("*")
                        .order("created_at", { ascending: false })
                        .then((r) => r.data || [])
                        .catch(() => []);
                    // Enrich manually (no FK constraints in DB)
                    j.forEach((job) => {
                        if (job.recruiter_id)
                            job.recruiter =
                                u.find((x) => x.id === job.recruiter_id) ||
                                null;
                    });
                    app.forEach((a) => {
                        if (a.job_id)
                            a.job = j.find((x) => x.id === a.job_id) || null;
                        if (a.applicant_id)
                            a.applicant =
                                u.find((x) => x.id === a.applicant_id) || null;
                    });
                    pay.forEach((p) => {
                        if (p.user_id)
                            p.profile =
                                u.find((x) => x.id === p.user_id) || null;
                    });
                    notif.forEach((n) => {
                        if (n.user_id)
                            n.user = u.find((x) => x.id === n.user_id) || null;
                    });
                    Object.assign(S, {
                        users: u,
                        jobs: j,
                        apps: app,
                        providers: prov,
                        convs: conv,
                        notifs: notif,
                        ads: ad,
                        payments: pay,
                        subs: subs,
                        events: ev,
                    });
                } catch (e) {
                    notify("Load failed: " + (e.message || e), "error");
                }
                S.loading = false;
                render();
            }

            async function doAct(fn, msg, action, target) {
                S.loading = true;
                render();
                try {
                    const res = await fn();
                    if (res && typeof res === "object" && res.error)
                        throw Object.assign(
                            new Error(res.error.message || "Operation failed"),
                            {
                                code: res.error.code,
                                hint: res.error.hint,
                                details: res.error.details,
                            },
                        );
                    notify(msg);
                    if (action) audit(action, target);
                    await loadData();
                    closeModal();
                } catch (e) {
                    const detail = e.code ? "[" + e.code + "] " : "";
                    const hint = e.hint ? " (" + e.hint + ")" : "";
                    const errMsg = detail + (e.message || "Failed") + hint;
                    notify(errMsg, "error");
                    console.error("Admin CRUD Error:", e);
                    S.loading = false;
                    render();
                }
            }

            function startAutoRefresh() {
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(() => {
                    if (refreshOn && S.user) loadData();
                }, 30000);
            }

            // ─── Session Timeout ──────────────────────────────────────────
            function resetSessionTimer() {
                if (sessionTimer) clearTimeout(sessionTimer);
                sessionTimer = setTimeout(() => {
                    if (S.user) {
                        audit("session_timeout", "session", "admin", {
                            reason: "inactivity",
                        });
                        notify(
                            "Session expired due to inactivity. Please sign in again.",
                            "warn",
                        );
                        logout();
                    }
                }, SESSION_TIMEOUT_MS);
            }
            function startSessionTimer() {
                resetSessionTimer();
                // Reset timer on any user activity
                [
                    "click",
                    "keydown",
                    "mousemove",
                    "scroll",
                    "touchstart",
                ].forEach((evt) => {
                    document.addEventListener(evt, resetSessionTimer, {
                        passive: true,
                    });
                });
            }

            function init() {
                const loginTime = parseInt(
                    sessionStorage.getItem("jb_login_time") || "0",
                );
                if (
                    loginTime > 0 &&
                    Date.now() - loginTime > SESSION_TIMEOUT_MS
                ) {
                    sessionStorage.removeItem("jb_login_time");
                    if (sb) sb.auth.signOut().catch(() => {});
                    S.user = null;
                    notify("Session expired. Please sign in again.", "warn");
                    render();
                    return;
                }
                startAutoRefresh();
                if (S.user) startSessionTimer();
                loadData();
            }

            // ─── HELPERS ──────────────────────────────────────────────────
            function closeModal(e) {
                if (!e || e.target.classList.contains("modal-overlay")) {
                    modal = null;
                    render();
                }
            }

            function confirmDelete(msg, fn, action, target) {
                modal = `
    <div class="modal-overlay" onclick="closeModal(event)"><div class="modal-card modal-sm" onclick="event.stopPropagation()">
      <div class="text-center">
        <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-2">Confirm Delete</h3>
        <p class="text-sm text-gray-600 mb-6">${esc(msg)}</p>
        <div class="flex gap-3">
          <button onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition">Cancel</button>
          <button onclick="doDelete()" class="flex-1 py-2.5 bg-red-600 text-white rounded-xl font-medium hover:bg-red-700 transition">Delete</button>
        </div>
      </div>
    </div></div>
  `;
                window.doDelete = () => {
                    closeModal();
                    doAct(fn, "Deleted successfully", action, target);
                };
                render();
            }

            function showForm(title, fields, submitFn, submitLabel, wide) {
                const f = fields
                    .map(
                        (f, i) => `
    <div class="${f.full ? "full" : ""}">
      <label class="block text-xs font-medium text-gray-600 mb-1">${esc(f.label)}</label>
      ${
          f.type === "textarea"
              ? `<textarea id="ff-${i}" rows="${f.rows || 3}" placeholder="${esc(f.placeholder || "")}" ${f.required ? "required" : ""}>${esc(f.value || "")}</textarea>`
              : f.type === "select"
                ? `<select id="ff-${i}" ${f.required ? "required" : ""}>${f.options.map((o) => `<option value="${esc(o.value)}" ${o.value === f.value ? "selected" : ""}>${esc(o.label)}</option>`).join("")}</select>`
                : `<input id="ff-${i}" type="${f.type || "text"}" placeholder="${esc(f.placeholder || "")}" value="${esc(f.value || "")}" ${f.required ? "required" : ""}>`
      }
    </div>
  `,
                    )
                    .join("");
                modal = `
    <div class="modal-overlay" onclick="closeModal(event)"><div class="modal-card ${wide ? "modal-wide" : ""}" onclick="event.stopPropagation()">
      <div class="flex justify-between items-start mb-5"><h3 class="text-lg font-bold">${esc(title)}</h3><button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button></div>
      <form id="crud-form" class="form-grid" onsubmit="submitForm(event)">${f}</form>
      <div class="flex gap-3 mt-6 pt-4 border-t border-gray-100">
        <button onclick="closeModal()" class="btn btn-ghost">Cancel</button>
        <button onclick="document.getElementById('crud-form').requestSubmit()" class="btn btn-primary">${esc(submitLabel)}</button>
      </div>
    </div></div>
  `;
                window.submitForm = (e, idx) => {
                    e.preventDefault();
                    const vals = [];
                    $$('#crud-form [id^="ff-"]').forEach((el) =>
                        vals.push(el.value),
                    );
                    submitFn(vals);
                };
                render();
            }

            // ═══════════════════════════════════════════════════════════════
            //  RENDER
            // ═══════════════════════════════════════════════════════════════
            function render() {
                if (!S.user) {
                    showLogin();
                    return;
                }
                if (S.loading) {
                    renderApp(
                        `<div class="h-screen flex items-center justify-center bg-gray-50"><div><div class="spinner mx-auto" style="width:40px;height:40px;border-width:3px;border-color:#e2e8f0;border-top-color:#2563eb"></div><p class="text-gray-400 text-sm mt-4">Loading dashboard...</p></div></div>`,
                    );
                    return;
                }
                const s = S;
                const st = {
                    totalUsers: s.users.length,
                    activeJobs: s.jobs.filter((j) => j.is_active).length,
                    featuredJobs: s.jobs.filter((j) => j.is_featured).length,
                    pendingJobs: s.jobs.filter((j) => !j.is_active).length,
                    pendingApps: s.apps.filter((a) => a.status === "pending")
                        .length,
                    reviewedApps: s.apps.filter((a) => a.status === "reviewed")
                        .length,
                    hiredApps: s.apps.filter((a) => a.status === "hired")
                        .length,
                    rejectedApps: s.apps.filter((a) => a.status === "rejected")
                        .length,
                    providers: s.providers.length,
                    unverifiedProv: s.providers.filter((p) => !p.is_verified)
                        .length,
                    premiumUsers: s.users.filter((u) => u.is_premium).length,
                    convs: s.convs.length,
                    notifs: s.notifs.length,
                    payments: s.payments.length,
                    totalRevenue: s.payments.reduce(
                        (sum, p) => sum + (p.amount || 0),
                        0,
                    ),
                    subs: s.subs.length,
                    jobViews: s.jobs.reduce(
                        (sum, j) => sum + (j.views || 0),
                        0,
                    ),
                };

                const mainNav = [
                    { id: "dashboard", label: "Dashboard", icon: "D" },
                    { id: "users", label: "Users", icon: "U" },
                    { id: "jobs", label: "Jobs", icon: "J" },
                    { id: "apps", label: "Applications", icon: "A" },
                    { id: "providers", label: "Providers", icon: "P" },
                    { id: "payments", label: "Payments", icon: "$" },
                    { id: "ads", label: "Ads", icon: "M" },
                    { id: "messages", label: "Messages", icon: "M" },
                    { id: "blog", label: "Blog Subs", icon: "B" },
                    { id: "notifs", label: "Notifications", icon: "N" },
                    { id: "audit", label: "Audit Log", icon: "L" },
                    { id: "settings", label: "Settings", icon: "S" },
                ];

                renderApp(`
    <div class="h-screen flex bg-gray-50">
      <div class="w-56 bg-white border-r border-gray-200 flex flex-col shrink-0">
        <div class="h-14 flex items-center gap-3 px-4 border-b border-gray-100">
          <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-blue-700 rounded-lg flex items-center justify-center text-white text-xs font-bold shadow-sm">JB</div>
          <div><div class="text-sm font-bold text-gray-900">JobBridge</div><div class="text-[10px] text-gray-400 -mt-0.5">Admin Console v2.0</div></div>
        </div>
        <div class="flex-1 overflow-y-auto py-2 px-2 space-y-0.5">
          ${mainNav.map((n) => navItem(n, st)).join("")}
        </div>
        <div class="p-3 border-t border-gray-100 bg-gray-50/50">
          <div class="flex items-center gap-2 mb-2">
            <div class="w-7 h-7 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white text-[10px] font-bold">A</div>
            <div class="text-xs text-gray-700 font-medium truncate">Administrator</div>
          </div>
          <button onclick="logout()" class="w-full py-1.5 text-xs text-red-500 hover:bg-red-50 rounded-lg font-medium transition">Sign Out</button>
        </div>
      </div>
      <div class="flex-1 flex flex-col overflow-hidden">
        <div class="h-14 bg-white border-b border-gray-200 flex items-center px-6 shrink-0 gap-3">
          <h2 class="text-base font-bold text-gray-900">${pageTitle()}</h2>
          <div class="flex-1"></div>
          ${refreshBtn()}
          <span class="text-xs text-gray-400">${new Date().toLocaleTimeString()}</span>
          <span class="w-2 h-2 rounded-full bg-emerald-400 inline-block"></span>
        </div>
        <div class="flex-1 overflow-y-auto p-6">
          <div class="max-w-7xl mx-auto">
            ${s.tab === "dashboard" ? dashboardHtml(st, s) : ""}
            ${s.tab === "users" ? usersHtml(s.users) : ""}
            ${s.tab === "jobs" ? jobsHtml(s.jobs) : ""}
            ${s.tab === "apps" ? appsHtml(s.apps) : ""}
            ${s.tab === "providers" ? providersHtml(s.providers, st) : ""}
            ${s.tab === "payments" ? paymentsHtml(s.payments, st) : ""}
            ${s.tab === "ads" ? adsHtml(s.ads) : ""}
            ${s.tab === "messages" ? messagesHtml(s.convs) : ""}
            ${s.tab === "blog" ? blogHtml(s.subs) : ""}
            ${s.tab === "notifs" ? notifsHtml(s.notifs) : ""}
            ${s.tab === "audit" ? auditHtml(s.events) : ""}
            ${s.tab === "settings" ? settingsHtml(st) : ""}
          </div>
        </div>
      </div>
    </div>
    ${modal || ""}
  `);
            }

            function refreshBtn() {
                return `<button onclick="toggleRefresh()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition ${refreshOn ? "bg-blue-50 text-blue-700" : "bg-gray-100 text-gray-500"}" title="${refreshOn ? "Auto-refresh on (30s)" : "Auto-refresh off"}">
    <svg class="w-3.5 h-3.5 ${refreshOn ? "" : "opacity-50"}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582M20 20v-5h-.581M4 9a9 9 0 0115.29-5.29M20 15a9 9 0 01-15.29 5.29"/></svg>
    ${refreshOn ? "Auto" : "Manual"}
  </button>`;
            }
            window.toggleRefresh = () => {
                refreshOn = !refreshOn;
                if (refreshOn) {
                    startAutoRefresh();
                    loadData();
                } else {
                    if (refreshInterval) clearInterval(refreshInterval);
                    notify("Auto-refresh paused", "warn");
                    render();
                }
                render();
            };

            function navItem(n, st) {
                const active = S.tab === n.id;
                let badge = null;
                if (n.id === "jobs" && st.pendingJobs > 0)
                    badge = st.pendingJobs;
                if (n.id === "apps" && st.pendingApps > 0)
                    badge = st.pendingApps;
                if (n.id === "providers" && st.unverifiedProv > 0)
                    badge = st.unverifiedProv;
                return `<button onclick="switchTab('${n.id}')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition relative ${active ? "bg-blue-50 text-blue-700" : "text-gray-600 hover:bg-gray-50 hover:text-gray-800"}">
    <span class="w-6 h-6 rounded-md flex items-center justify-center text-xs font-bold ${active ? "bg-blue-600 text-white" : "bg-gray-100 text-gray-500"}">${n.icon}</span>
    <span class="flex-1 text-left">${n.label}</span>
    ${badge ? `<span class="tab-badge bg-red-500 text-white">${badge}</span>` : ""}
  </button>`;
            }

            function pageTitle() {
                const titles = {
                    dashboard: "Dashboard Overview",
                    users: "User Management",
                    jobs: "Jobs & Moderation",
                    apps: "Application Pipeline",
                    providers: "Service Providers",
                    payments: "Financial Management",
                    ads: "Advertisements",
                    messages: "Messages & Conversations",
                    blog: "Blog Subscribers",
                    notifs: "Notifications",
                    audit: "System Audit Log",
                    settings: "Settings",
                };
                return titles[S.tab] || "Dashboard";
            }

            // ═══════════════════════════════════════════════════════════════
            //  DASHBOARD
            // ═══════════════════════════════════════════════════════════════
            function dashboardHtml(st, s) {
                const seekerCount = s.users.filter(
                    (u) => u.role === "job_seeker",
                ).length;
                const recruiterCount = s.users.filter(
                    (u) => u.role === "recruiter",
                ).length;
                const providerCount = s.users.filter(
                    (u) => u.role === "provider",
                ).length;
                const total = seekerCount + recruiterCount + providerCount || 1;
                const days = [...Array(7)].map((_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - 6 + i);
                    return d;
                });
                const jobTrend = days.map((d) => {
                    const ds = d.toDateString();
                    return s.jobs.filter(
                        (j) => new Date(j.created_at).toDateString() === ds,
                    ).length;
                });
                const appTrend = days.map((d) => {
                    const ds = d.toDateString();
                    return s.apps.filter(
                        (a) => new Date(a.created_at).toDateString() === ds,
                    ).length;
                });
                const maxTrend = Math.max(...jobTrend, ...appTrend, 1);
                const recentEvents = s.events.slice(0, 8);
                return `
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 mb-6">
      <div class="stat-card"><div class="stat-num text-blue-600">${st.totalUsers}</div><div class="stat-label">Total Users</div></div>
      <div class="stat-card"><div class="stat-num text-emerald-600">${st.activeJobs}</div><div class="stat-label">Active Jobs</div></div>
      <div class="stat-card"><div class="stat-num text-amber-600">${st.pendingApps}</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-num text-violet-600">${money(st.totalRevenue)}</div><div class="stat-label">Revenue</div></div>
      <div class="stat-card"><div class="stat-num text-rose-600">${st.unverifiedProv}</div><div class="stat-label">Unverified Providers</div></div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
      <div class="lg:col-span-2 bg-white rounded-xl border border-gray-200 p-5">
        <h3 class="text-sm font-bold text-gray-900 mb-4">7-Day Trend</h3>
        <div class="flex items-end gap-2 h-28">
          ${days
              .map(
                  (d, i) => `
            <div class="flex-1 flex flex-col items-center gap-1">
              <div class="w-full flex flex-col items-center justify-end" style="height:110px">
                <div title="${jobTrend[i]} jobs" class="w-3/4 bg-blue-500 rounded-t transition-all" style="height:${Math.max((jobTrend[i] / maxTrend) * 80, 2)}px"></div>
                <div title="${appTrend[i]} apps" class="w-3/4 bg-amber-400 rounded-t transition-all mt-0.5" style="height:${Math.max((appTrend[i] / maxTrend) * 80, 2)}px"></div>
              </div>
              <span class="text-[10px] text-gray-400">${d.toLocaleDateString("en", { weekday: "short" })}</span>
            </div>
          `,
              )
              .join("")}
        </div>
        <div class="flex gap-4 mt-2 text-xs text-gray-500"><span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded bg-blue-500"></span>Jobs</span><span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded bg-amber-400"></span>Applications</span></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h3 class="text-sm font-bold text-gray-900 mb-4">User Distribution</h3>
        <div class="space-y-3">
          ${[
              { l: "Job Seekers", n: seekerCount, c: "bg-blue-500" },
              { l: "Recruiters", n: recruiterCount, c: "bg-emerald-500" },
              { l: "Providers", n: providerCount, c: "bg-amber-500" },
          ]
              .map(
                  (r) => `
            <div><div class="flex justify-between text-xs mb-1"><span class="text-gray-600">${r.l}</span><span class="font-medium">${r.n}</span></div><div class="chart-bar"><div class="chart-bar-fill ${r.c}" style="width:${(r.n / total) * 100}%"></div></div></div>
          `,
              )
              .join("")}
        </div>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <div class="flex items-center justify-between mb-3"><h3 class="text-sm font-bold text-gray-900">Recent Activity</h3></div>
        ${
            recentEvents.length === 0
                ? '<p class="text-sm text-gray-400 py-4 text-center">No recent activity</p>'
                : `<div class="space-y-2">${recentEvents
                      .map(
                          (e) => `
          <div class="flex items-center gap-2 text-xs">
            <span class="badge ${sColor(e.action_type?.includes("delete") ? "rejected" : e.action_type?.includes("create") ? "active" : "pending")}" style="font-size:9px">${esc((e.action_type || "event").slice(0, 14))}</span>
            <span class="text-gray-500">${esc(e.target_type || "")}</span>
            <span class="text-gray-400 ml-auto">${fdatetime(e.created_at)}</span>
          </div>
        `,
                      )
                      .join("")}</div>`
        }
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <div class="flex items-center justify-between mb-3"><h3 class="text-sm font-bold text-gray-900">Quick Actions</h3></div>
        <div class="grid grid-cols-2 gap-2">
          <button class="btn btn-primary text-xs" onclick="switchTab('jobs')">Review Jobs (${st.pendingJobs})</button>
          <button class="btn btn-success text-xs" onclick="switchTab('providers')">Verify Providers (${st.unverifiedProv})</button>
          <button class="btn btn-ghost text-xs" onclick="switchTab('apps')">Applications (${st.pendingApps})</button>
          <button class="btn btn-ghost text-xs" onclick="switchTab('notifs')">Send Notification</button>
        </div>
      </div>
    </div>
  `;
            }

            // ═══════════════════════════════════════════════════════════════
            //  USERS — Full CRUD
            // ═══════════════════════════════════════════════════════════════
            let userFilter = "all";
            function usersHtml(users) {
                const filtered =
                    userFilter === "all"
                        ? users
                        : users.filter((u) => u.role === userFilter);
                const banned = users.filter(
                    (u) => u.is_active === false,
                ).length;
                const verified = users.filter((u) => u.is_verified).length;
                return `
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <h3 class="text-sm font-bold text-gray-900">Users <span class="text-gray-400 font-normal">(${users.length})</span></h3>
      <div class="flex items-center gap-2 text-xs"><span class="text-gray-400">Verified: ${verified}</span><span class="text-gray-400">Inactive: ${banned}</span><span class="text-gray-400">Premium: ${users.filter((u) => u.is_premium).length}</span></div>
    </div>
    <div class="flex gap-2 mb-4 flex-wrap items-center">
      ${["all", "job_seeker", "recruiter", "provider", "admin"]
          .map(
              (r) => `
        <button onclick="setUserFilter('${r}')" class="px-3 py-1.5 rounded-lg text-xs font-medium transition ${userFilter === r ? "bg-blue-600 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200"}">${r === "all" ? "All" : r.replace("_", " ")}</button>
      `,
          )
          .join("")}
      <span class="flex-1"></span>
      <input id="user-search" placeholder="Search name or email..." class="max-w-xs text-xs" oninput="userSearch(this.value)">
      <button class="btn btn-primary text-xs" onclick="showAddUser()">+ Add User</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="table-wrap"><table class="w-full">
        <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Premium</th><th>Joined</th><th>Actions</th></tr>
        ${
            filtered.length === 0
                ? '<tr><td colspan="7" class="text-center text-gray-400 py-8 text-sm">No users found</td></tr>'
                : filtered
                      .map(
                          (u) => `
          <tr id="ur-${u.id}">
            <td class="font-medium text-sm">${esc(u.full_name || "\u2014")}</td>
            <td class="text-xs text-gray-500">${esc(u.email || "")}</td>
            <td><span class="badge ${roleColor(u.role)}">${u.role || "\u2014"}</span></td>
            <td><span class="badge ${sColor(u.is_active !== false)}">${u.is_active !== false ? "Active" : "Suspended"}</span></td>
            <td>${u.is_premium ? '<span class="badge bg-yellow-100 text-yellow-700">Premium</span>' : '<span class="text-xs text-gray-400">Free</span>'}</td>
            <td class="text-xs text-gray-400">${fdate(u.created_at)}</td>

            // ═══════════════════════════════════════════════════════════════
            //  PAYMENTS — CRUD
            // ═══════════════════════════════════════════════════════════════
            function paymentsHtml(payments, st) {
                const plans = [
                    ...new Set(
                        payments.filter((p) => p.plan).map((p) => p.plan),
                    ),
                ];
                const revenueByPlan = plans.map((pl) => ({
                    plan: pl,
                    total: payments
                        .filter((p) => p.plan === pl)
                        .reduce((s, p) => s + (p.amount || 0), 0),
                    count: payments.filter((p) => p.plan === pl).length,
                }));
                const maxRev = Math.max(
                    ...revenueByPlan.map((r) => r.total),
                    1,
                );
                const successPayments = payments.filter(
                    (p) => p.status === "verified" || p.status === "success",
                );
                return `
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="stat-card"><div class="stat-num text-violet-600">${money(st.totalRevenue)}</div><div class="stat-label">Total Revenue</div></div>
      <div class="stat-card"><div class="stat-num text-blue-600">${payments.length}</div><div class="stat-label">Transactions</div></div>
      <div class="stat-card"><div class="stat-num text-emerald-600">${successPayments.length}</div><div class="stat-label">Successful</div></div>
      <div class="stat-card"><div class="stat-num text-amber-600">${payments.filter((p) => p.status === "pending").length}</div><div class="stat-label">Pending</div></div>
    </div>
    ${
        revenueByPlan.length
            ? `
    <div class="bg-white rounded-xl border border-gray-200 p-5 mb-6">
      <h3 class="text-sm font-bold text-gray-900 mb-4">Revenue by Plan</h3>
      <div class="space-y-3">
        ${revenueByPlan
            .map(
                (r) => `
          <div><div class="flex justify-between text-xs mb-1"><span class="font-medium text-gray-700">${esc(r.plan)}</span><span class="text-gray-500">${money(r.total)} (${r.count})</span></div>
          <div class="chart-bar"><div class="chart-bar-fill bg-violet-500" style="width:${(r.total / maxRev) * 100}%"></div></div></div>
        `,
            )
            .join("")}
      </div>
    </div>`
            : ""
    }
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="p-3 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
        <span class="text-xs font-semibold text-gray-700">Transaction Ledger</span>
        <button class="btn btn-primary text-xs" onclick="showAddPayment()">+ Manual Entry</button>
      </div>
      <div class="table-wrap"><table class="w-full">
        <tr><th>User</th><th>Plan</th><th>Amount</th><th>Reference</th><th>Status</th><th>Date</th><th>Actions</th></tr>
        ${
            payments.length === 0
                ? '<tr><td colspan="7" class="text-center text-gray-400 py-8 text-sm">No payments yet</td></tr>'
                : payments
                      .map(
                          (p) => `
          <tr>
            <td class="font-medium text-xs">${esc(p.profile?.full_name || "\u2014")}</td>
            <td class="text-xs">${esc(p.plan || "\u2014")}</td>
            <td class="text-xs font-medium">${money(p.amount)}</td>
            <td class="text-xs text-gray-400" title="${esc(p.reference || "")}">${esc((p.reference || "\u2014").slice(0, 12))}...</td>
            <td><span class="badge ${sColor(p.status)}">${p.status || "\u2014"}</span></td>
            <td class="text-xs text-gray-400">${fdate(p.created_at)}</td>
            <td>
              <div class="flex gap-1 flex-wrap">
                ${
                    p.status === "pending"
                        ? `<button class="btn btn-success text-xs" onclick="verifyPayment('${p.id}')">Verify</button>
                <button class="btn btn-danger text-xs" onclick="failPayment('${p.id}')">Fail</button>`
                        : ""
                }
                <select onchange="paymentAction('${p.id}',this.value)" class="text-xs p-1 border rounded-lg w-auto inline" style="width:auto">
                  <option value="">More</option>
                  <option value="refund">Mark Refunded</option>
                  <option value="delete">Delete</option>
                </select>
              </div>
            </td>
          </tr>
        `,
                      )
                      .join("")
        }
      </table></div>
    </div>
  `;
            }
            window.verifyPayment = (id) =>
                doAct(
                    () =>
                        sb
                            .from("payments")

                    "payment_verify",
                    id,

            window.failPayment = (id) =>

            // ═══════════════════════════════════════════════════════════════

            function messagesHtml(convs) {
