            // ═══════════════════════════════════════════════════════════════
            //  BLOG SUBS — Read + Delete + Add
            // ═══════════════════════════════════════════════════════════════
            function blogHtml(subs) {
                return `
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-bold text-gray-900">Blog Subscribers <span class="text-gray-400 font-normal">(${subs.length})</span></h3>
      <div class="flex gap-2">
        <button class="btn btn-ghost text-xs" onclick="exportSubsCSV()">Export CSV</button>
        <button class="btn btn-primary text-xs" onclick="showAddSub()">+ Add</button>
      </div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="table-wrap"><table class="w-full">
        <tr><th>Email</th><th>Subscribed</th><th>Actions</th></tr>
        ${
            subs.length === 0
                ? '<tr><td colspan="3" class="text-center text-gray-400 py-8 text-sm">No subscribers</td></tr>'
                : subs
                      .map(
                          (s) => `
          <tr>
            <td class="font-medium text-sm">${esc(s.email)}</td>
            <td class="text-xs text-gray-400">${fdate(s.created_at)}</td>
            <td><button class="btn btn-danger text-xs" onclick="deleteSub('${s.id}')">Remove</button></td>
          </tr>
        `,
                      )
                      .join("")
        }
      </table></div>
    </div>
  `;
            }
            window.exportSubsCSV = () => {
                const rows = [["Email", "Subscribed Date"]];
                S.subs.forEach((s) =>
                    rows.push([s.email || "", s.created_at || ""]),
                );
                const csv = rows
                    .map((r) =>
                        r
                            .map(
                                (c) =>
                                    '"' + String(c).replace(/"/g, '""') + '"',
                            )
                            .join(","),
                    )
                    .join("\n");
                const b = new Blob([csv], { type: "text/csv" }),
                    el = document.createElement("a");
                el.href = URL.createObjectURL(b);
                el.download = "blog_subscribers.csv";
                el.click();
                notify("Exported");
            };
            window.deleteSub = (id) =>
                confirmDelete(
                    "Remove this subscriber?",
                    () => sb.from("blog_subscribers").delete().eq("id", id),
                    "sub_delete",
                    id,
                );
            window.showAddSub = () => {
                showForm(
                    "Add Subscriber",
                    [{ label: "Email", type: "email", required: true }],
                    (vals) => {
                        doAct(
                            () =>
                                sb
                                    .from("blog_subscribers")
                                    .insert({ email: vals[0] }),
                            "Subscriber added",
                            "sub_add",
                            vals[0],
                        );
                    },
                    "Add",
                );
            };

            // ═══════════════════════════════════════════════════════════════
            //  NOTIFICATIONS — Real admin sends + broadcasts
            // ═══════════════════════════════════════════════════════════════
            function notifsHtml(notifs) {
                const recent = notifs.slice(0, 150);
                const byType = {
                    system: recent.filter((n) => n.type === "system").length,
                    payment: recent.filter((n) => n.type === "payment").length,
                    applications: recent.filter(
                        (n) => n.type === "job_application",
                    ).length,
                    unread: recent.filter((n) => !n.is_read).length,
                };
                return `
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="stat-card"><div class="stat-num text-blue-600">${recent.length}</div><div class="stat-label">Recent Notifications</div></div>
      <div class="stat-card"><div class="stat-num text-gray-700">${byType.system}</div><div class="stat-label">System</div></div>
      <div class="stat-card"><div class="stat-num text-green-600">${byType.payment}</div><div class="stat-label">Payment</div></div>
      <div class="stat-card"><div class="stat-num text-amber-600">${byType.applications}</div><div class="stat-label">Applications</div></div>
    </div>
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div>
        <h3 class="text-sm font-bold text-gray-900">Notifications <span class="text-gray-400 font-normal">(${notifs.length})</span></h3>
        <p class="text-xs text-gray-500 mt-1">Send platform-wide broadcasts or one-off user notifications backed by Supabase.</p>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-ghost text-xs" onclick="switchTab('users')">Choose Recipient</button>
        <button class="btn btn-primary text-xs" onclick="showAddNotif()">+ Compose Notification</button>
      </div>
    </div>
    <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-4">
      <div class="flex items-start justify-between gap-4 flex-wrap">
        <div>
          <h4 class="text-sm font-semibold text-blue-900">Admin broadcast tools</h4>
          <p class="text-xs text-blue-700 mt-1">Use this composer for system announcements, maintenance notices, payment updates, and targeted user messages.</p>
        </div>
        <button class="btn btn-primary text-xs" onclick="showAddNotif()">Send now</button>
      </div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="p-3 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
        <span class="text-xs font-semibold text-gray-700">Notification log</span>
        <span class="text-xs text-gray-400">Unread: ${byType.unread}</span>
      </div>
      <div class="table-wrap"><table class="w-full">
        <tr><th>Recipient</th><th>Type</th><th>Title</th><th>Content</th><th>Status</th><th>Date</th><th>Actions</th></tr>
        ${
            notifs.length === 0
                ? '<tr><td colspan="7" class="text-center text-gray-400 py-8 text-sm">No notifications</td></tr>'
                : notifs
                      .map(
                          (n) => `
          <tr>
            <td class="font-medium text-xs">${esc(n.user?.full_name || n.user?.email || n.user_id?.slice(0, 8) || "Unknown")}</td>
            <td><span class="badge ${sColor(n.type === "payment" ? "success" : n.type === "job_application" ? "reviewed" : n.type === "advert" ? "pending" : "active")}">${esc(n.type || "system")}</span></td>
            <td class="text-xs font-medium">${esc(n.title || "")}</td>
            <td class="text-xs text-gray-500 max-w-xs truncate">${esc((n.content || "").slice(0, 90))}</td>
            <td><span class="badge ${n.is_read ? "bg-gray-100 text-gray-600" : "bg-blue-100 text-blue-700"}">${n.is_read ? "Read" : "Unread"}</span></td>
            <td class="text-xs text-gray-400">${fdatetime(n.created_at)}</td>
            <td><button class="btn btn-danger text-xs" onclick="deleteNotif('${n.id}')">Del</button></td>
          </tr>
        `,
                      )
                      .join("")
        }
      </table></div>
    </div>
  `;
            }
            window.deleteNotif = (id) =>
                confirmDelete(
                    "Delete this notification?",
                    () => sb.from("notifications").delete().eq("id", id),
                    "notif_delete",
                    id,
                );
            function notificationRecipients(audience, recipientId) {
                const activeUsers = S.users.filter(
                    (u) =>
                        u.id && u.role !== "suspended" && u.is_active !== false,
                );
                if (audience === "single")
                    return recipientId ? [recipientId] : [];
                if (audience === "recruiters") {
                    return activeUsers
                        .filter((u) => u.role === "recruiter")
                        .map((u) => u.id);
                }
                if (audience === "providers") {
                    return activeUsers
                        .filter((u) => u.role === "provider")
                        .map((u) => u.id);
                }
                if (audience === "job_seekers") {
                    return activeUsers
                        .filter((u) => u.role === "job_seeker")
                        .map((u) => u.id);
                }
                return activeUsers.map((u) => u.id);
            }

            async function insertNotificationBatch(rows) {
                if (!rows.length) return 0;
                const chunkSize = 500;
                for (let i = 0; i < rows.length; i += chunkSize) {
                    const chunk = rows.slice(i, i + chunkSize);
                    const { error } = await sb
                        .from("notifications")
                        .insert(chunk);
                    if (error) throw error;
                }
                return rows.length;
            }

            window.showAddNotif = () => {
                const userOpts = S.users
                    .filter((u) => u.email)
                    .map((u) => ({
                        value: u.id,
                        label: (u.full_name || u.email) + " <" + u.email + ">",
                    }));
                showForm(
                    "Compose Notification",
                    [
                        {
                            label: "Audience",
                            type: "select",
                            value: "broadcast",
                            options: [
                                {
                                    value: "broadcast",
                                    label: "All active users (broadcast)",
                                },
                                {
                                    value: "recruiters",
                                    label: "All recruiters",
                                },
                                {
                                    value: "job_seekers",
                                    label: "All job seekers",
                                },
                                { value: "providers", label: "All providers" },
                                { value: "single", label: "Single user" },
                            ],
                            required: true,
                        },
                        {
                            label: "Recipient",
                            type: "select",
                            value: userOpts[0]?.value || "",
                            options: userOpts.length
                                ? userOpts
                                : [{ value: "", label: "No users available" }],
                        },
                        {
                            label: "Type",
                            type: "select",
                            value: "system",
                            options: [
                                { value: "system", label: "System" },
                                { value: "payment", label: "Payment" },
                                {
                                    value: "job_application",
                                    label: "Job Application",
                                },
                                { value: "advert", label: "Advert" },
                                { value: "review", label: "Review" },
                                { value: "interview", label: "Interview" },
                                { value: "message", label: "Message" },
                            ],
                            required: true,
                        },
                        {
                            label: "Title",
                            type: "text",
                            required: true,
                            placeholder: "e.g. Platform maintenance",
                        },
                        {
                            label: "Content",
                            type: "textarea",
                            rows: 4,
                            required: true,
                            full: true,
                            placeholder:
                                "Write the notification content shown to recipients.",
                        },
                        {
                            label: "Metadata (JSON, optional)",
                            type: "textarea",
                            rows: 3,
                            full: true,
                            placeholder: '{"category":"maintenance"}',
                        },
                    ],
                    (vals) => {
                        const audience = vals[0];
                        const recipientId = vals[1];
                        const type = vals[2];
                        const title = vals[3];
                        const content = vals[4];
                        const rawData = vals[5];
                        let metadata = {};

                        if (rawData && rawData.trim()) {
                            try {
                                metadata = JSON.parse(rawData);
                            } catch (e) {
                                notify("Metadata must be valid JSON", "error");
                                return;
                            }
                        }

                        if (audience === "single" && !recipientId) {
                            notify(
                                "Select a recipient for single-user notifications",
                                "error",
                            );
                            return;
                        }

                        const recipients = notificationRecipients(
                            audience,
                            recipientId,
                        );

                        if (!recipients.length) {
                            notify(
                                "No eligible recipients found for this audience",
                                "error",
                            );
                            return;
                        }

                        const rows = recipients.map((userId) => ({
                            user_id: userId,
                            type,
                            title,
                            content,
                            data: {
                                ...metadata,
                                source: "admin_console",
                                audience,
                                sent_at: new Date().toISOString(),
                            },
                        }));

                        const actionLabel =
                            audience === "single"
                                ? "notif_send"
                                : "notif_broadcast";

                        doAct(
                            async () => insertNotificationBatch(rows),
                            `Notification sent to ${rows.length} recipient${rows.length === 1 ? "" : "s"}`,
                            actionLabel,
                            title,
                        );
                    },
                    "Send Notification",
                    true,
                );
            };

            // ═══════════════════════════════════════════════════════════════
            //  AUDIT LOG
            // ═══════════════════════════════════════════════════════════════
            function auditHtml(events) {
                return `
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-bold text-gray-900">System Audit Log <span class="text-gray-400 font-normal">(${events.length} entries)</span></h3>
      <button class="btn btn-ghost text-xs" onclick="exportLog()">Export CSV</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="table-wrap"><table class="w-full">
        <tr><th>Time</th><th>Action</th><th>Target</th><th>Target ID</th><th>Details</th></tr>
        ${
            events.length === 0
                ? '<tr><td colspan="5" class="text-center text-gray-400 py-8 text-sm">No audit events</td></tr>'
                : events
                      .map(
                          (e) => `
          <tr>
            <td class="text-xs text-gray-400">${e.created_at ? fdatetime(e.created_at) : "\u2014"}</td>
            <td><span class="badge bg-gray-100 text-gray-700">${esc(e.action_type || "\u2014")}</span></td>
            <td class="text-xs">${esc(e.target_type || "\u2014")}</td>
            <td class="text-xs text-gray-400">${esc(e.target_id ? e.target_id.slice(0, 8) : "\u2014")}</td>
            <td class="text-xs text-gray-400 max-w-xs truncate">${e.details ? JSON.stringify(e.details).slice(0, 40) : "\u2014"}</td>
          </tr>
        `,
                      )
                      .join("")
        }
      </table></div>
    </div>
  `;
            }
            window.exportLog = () => {
                const rows = [
                    ["Time", "Action", "Target", "Target ID", "Details"],
                ];
                S.events.forEach((e) =>
                    rows.push([
                        e.created_at || "",
                        e.action_type || "",
                        e.target_type || "",
                        e.target_id || "",
                        JSON.stringify(e.details || {}),
                    ]),
                );
                const csv = rows
                    .map((r) =>
                        r
                            .map(
                                (c) =>
                                    '"' + String(c).replace(/"/g, '""') + '"',
                            )
                            .join(","),
                    )
                    .join("\n");
                const b = new Blob([csv], { type: "text/csv" }),
                    a = document.createElement("a");
                a.href = URL.createObjectURL(b);
                a.download = "audit_log.csv";
                a.click();
                notify("Audit log exported");
            };

            // ═══════════════════════════════════════════════════════════════
            //  SETTINGS
            // ═══════════════════════════════════════════════════════════════
            function settingsHtml(st) {
                return `
    <h3 class="text-sm font-bold text-gray-900 mb-4">Admin Settings</h3>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h4 class="font-semibold text-gray-900 text-sm mb-4">Admin Authentication</h4>
        <div class="text-xs text-gray-500 mb-4">This console now uses real Supabase authentication with an <code class="bg-gray-100 px-1 rounded">admin</code> profile role. Do not embed service-role credentials in this file.</div>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-gray-500">Signed-in admin</span><span class="font-medium">${esc(S.user?.email || "—")}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">Dashboard Version</span><span class="font-medium">2.1</span></div>
          <div class="flex justify-between"><span class="text-gray-500">Supabase Project</span><span class="font-medium text-xs">ppramomuckkjzssrfghi</span></div>
          <div class="flex justify-between"><span class="text-gray-500">Auto-Refresh</span><span class="font-medium">${refreshOn ? "Every 30s" : "Paused"}</span></div>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h4 class="font-semibold text-gray-900 text-sm mb-4">Platform Summary</h4>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between"><span class="text-gray-500">Users</span><span class="font-medium">${S.users.length}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">Jobs</span><span class="font-medium">${S.jobs.length}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">Applications</span><span class="font-medium">${S.apps.length}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">Payments</span><span class="font-medium">${S.payments.length}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">Audit Events</span><span class="font-medium">${S.events.length}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">Total Revenue</span><span class="font-medium">${money(st.totalRevenue)}</span></div>
        </div>
      </div>
    </div>
  `;
            }

            // ═══════════════════════════════════════════════════════════════
            //  GLOBALS
            // ═══════════════════════════════════════════════════════════════
            window.switchTab = (t) => {
                S.tab = t;
                render();
            };
            window.logout = async () => {
                await audit("logout", "session", S.user?.id || "admin", {});
                sessionStorage.removeItem("jb_login_time");
                S.user = null;
                if (refreshInterval) clearInterval(refreshInterval);
                if (sessionTimer) clearTimeout(sessionTimer);
                if (sb) {
                    try {
                        await sb.auth.signOut();
                    } catch (e) {}
                }
                render();
            };

            async function bootstrapAdmin() {
                if (!isSupabaseConfigured()) {
                    renderConfigError();
                    return;
                }

                const adminUser = await resolveAdminUserFromSession();
                if (adminUser) {
                    S.user = adminUser;
                    init();
                    return;
                }

                showLogin();
            }

            // Boot
            bootstrapAdmin();
        </script>
    </body>
</html>
