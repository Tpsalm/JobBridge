<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='24' cy='8' r='6' fill='%232563EB'/%3E%3Crect x='18' y='16' width='12' height='36' rx='2' fill='%231D4ED8'/%3E%3Cpath d='M30 52 C30 58 24 62 18 58 C14 55 14 50 18 48' stroke='%231D4ED8' stroke-width='10' stroke-linecap='round' fill='none'/%3E%3Cpath d='M30 28 Q40 14 52 28' stroke='%231D4ED8' stroke-width='4' stroke-linecap='round' fill='none'/%3E%3Cline x1='28' y1='28' x2='54' y2='28' stroke='%231D4ED8' stroke-width='3.5' stroke-linecap='round'/%3E%3Cline x1='34' y1='19' x2='34' y2='28' stroke='%231D4ED8' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='41' y1='15.5' x2='41' y2='28' stroke='%231D4ED8' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='48' y1='19' x2='48' y2='28' stroke='%231D4ED8' stroke-width='2.5' stroke-linecap='round'/%3E%3Crect x='50' y='28' width='6' height='24' rx='2' fill='%231D4ED8'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobBridge - Professional Network</title>
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      connect-src 'self' https://*.supabase.co https://api.openai.com https://api.paystack.com https://fonts.googleapis.com https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      font-src 'self' https://fonts.gstatic.com;
      frame-src https://checkout.paystack.com;
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #faf9f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-loader .ring {
        position: relative;
        width: 80px;
        height: 80px;
      }
      #app-loader .ring svg.spinner {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        animation: spin 1s linear infinite;
      }
      #app-loader .ring svg.logo {
        position: absolute;
        inset: 14px;
        width: 52px;
        height: 52px;
      }
      #app-loader .ring svg.spinner circle {
        fill: none;
        stroke: #1e40af;
        stroke-width: 3;
        stroke-dasharray: 170;
        stroke-dashoffset: 40;
        stroke-linecap: round;
      }
      #app-loader .text {
        margin-top: 24px;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 14px;
        color: #6b7280;
        letter-spacing: 0.3px;
        transition: opacity 0.4s ease;
      }
      #app-loader.loaded .text.loading-text { opacity: 0; }
      #app-loader .text.loaded-text { display: none; }
      #app-loader.loaded .text.loaded-text {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-direction: column;
      }
      #app-loader.loaded .text.loaded-text a {
        color: #1e40af;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
      }
      #app-loader.loaded .text.loaded-text a:hover {
        text-decoration: underline;
      }
      #app-loader.loaded .text.loaded-text .url {
        font-size: 12px;
        color: #9ca3af;
      }
      #app-loader.loaded .ring svg.spinner {
        animation: none;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      #app-loader.loaded .ring svg.spinner circle {
        stroke: #d1d5db;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="ring">
        <svg class="spinner" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="26" />
        </svg>
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
          <circle cx="24" cy="8" r="6" fill="#2563EB" />
          <rect x="18" y="16" width="12" height="36" rx="2" fill="#1D4ED8" />
          <path d="M30 52 C30 58 24 62 18 58 C14 55 14 50 18 48" stroke="#1D4ED8" stroke-width="10" stroke-linecap="round" fill="none" />
          <path d="M30 28 Q40 14 52 28" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round" fill="none" />
          <line x1="28" y1="28" x2="54" y2="28" stroke="#1D4ED8" stroke-width="3.5" stroke-linecap="round" />
          <line x1="34" y1="19" x2="34" y2="28" stroke="#1D4ED8" stroke-width="2.5" stroke-linecap="round" />
          <line x1="41" y1="15.5" x2="41" y2="28" stroke="#1D4ED8" stroke-width="2.5" stroke-linecap="round" />
          <line x1="48" y1="19" x2="48" y2="28" stroke="#1D4ED8" stroke-width="2.5" stroke-linecap="round" />
          <rect x="50" y="28" width="6" height="24" rx="2" fill="#1D4ED8" />
        </svg>
      </div>
      <div class="text loading-text">Connecting to JobBridge...</div>
      <div class="text loaded-text">
        <a href="https://tpsalm.github.io/JobBridge/" target="_blank">JobBridge</a>
        <span class="url">https://tpsalm.github.io/JobBridge/</span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var loader = document.getElementById('app-loader');
        function hideLoader() {
          loader.classList.add('loaded');
          setTimeout(function() { loader.classList.add('hidden'); }, 600);
        }
        // If React hasn't mounted after 2s, show loaded state anyway
        setTimeout(hideLoader, 2000);
        // Listen for React mount signal
        document.addEventListener('app-mounted', hideLoader);
      })();
    </script>
  </body>
</html>
